<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wachtwoord herstellen</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>Platform</h1>
            <h3>Nieuw wachtwoord instellen</h3>
            
            <input type="password" id="nieuwWachtwoord" placeholder="Nieuw wachtwoord" required>
            <input type="password" id="bevestigWachtwoord" placeholder="Bevestig nieuw wachtwoord" required>
            <button id="resetWachtwoordBtn" class="btn btn-primary">Wachtwoord bijwerken</button>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        const nieuwWachtwoord = document.getElementById('nieuwWachtwoord');
        const bevestigWachtwoord = document.getElementById('bevestigWachtwoord');
        const resetBtn = document.getElementById('resetWachtwoordBtn');
        
        resetBtn.addEventListener('click', async () => {
            const nieuw = nieuwWachtwoord.value;
            const bevestig = bevestigWachtwoord.value;
            
            if (!nieuw || !bevestig) {
                alert('Vul beide velden in');
                return;
            }
            
            if (nieuw !== bevestig) {
                alert('Wachtwoorden komen niet overeen');
                return;
            }
            
            if (nieuw.length < 6) {
                alert('Wachtwoord moet minimaal 6 tekens zijn');
                return;
            }
            
            const { error } = await supabase.auth.updateUser({ password: nieuw });
            
            if (error) {
                alert('Fout: ' + error.message);
            } else {
                alert('Wachtwoord succesvol bijgewerkt! Je kunt nu inloggen.');
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
