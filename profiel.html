<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project - mijn profiel</title>
    
    <!-- ===== VOORKOM FLITS VAN LIGHT MODE ===== -->
    <script>
        // Dit script wordt direct uitgevoerd voordat de CSS wordt geladen
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                // Voorkom nog meer flits
                document.documentElement.style.backgroundColor = '#0f0f1a';
                document.documentElement.style.color = '#f0f0f0';
            }
        })();
    </script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="navigatie-placeholder"></div>
    
    <main class="container">
        <div class="page-header">
            <h1>👤 Mijn profiel</h1>
        </div>
        
        <div class="profiel-card">
            <h2>Accountgegevens</h2>
            <div class="profiel-info">
                <p><strong>E-mailadres:</strong> <span id="profielEmail"></span></p>
                <p><strong>Account aangemaakt op:</strong> <span id="profielAangemaakt"></span></p>
                <p><strong>Laatste inlog:</strong> <span id="profielLaatsteInlog"></span></p>
            </div>
            
            <hr>
            
            <h3>Wachtwoord wijzigen</h3>
            <div class="wachtwoord-form">
                <input type="password" id="huidigWachtwoord" placeholder="Huidig wachtwoord">
                <input type="password" id="nieuwWachtwoord" placeholder="Nieuw wachtwoord">
                <input type="password" id="bevestigWachtwoord" placeholder="Bevestig nieuw wachtwoord">
                <button id="updateWachtwoordBtn" class="btn btn-primary">Wachtwoord bijwerken</button>
            </div>
            
            <button id="logoutBtnProfiel" class="btn btn-danger">Uitloggen</button>
        </div>
    </main>
    
       <!-- ===== SCRIPTS ===== -->
<!-- 1. Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2. Configuratie -->
<script src="js/config.js"></script>

<!-- 3. MAIN (als module) - laadt navigatie, thema, versie -->
<script type="module" src="js/main.js"></script>

<!-- 4. Admin specifiek (als module) -->
<script type="module" src="js/admin.js"></script>
</body>
</html>
