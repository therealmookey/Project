<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Login</title>
    
    <!-- ===== VOORKOM FLITS VAN LIGHT MODE ===== -->
    <script>
        // Dit script wordt direct uitgevoerd voordat de CSS wordt geladen
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                // Voorkom nog meer flits
                document.documentElement.style.backgroundColor = '#0f0f1a';
                document.documentElement.style.color = '#f0f0f0';
            }
        })();
    </script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>🏥Platform</h1>
            <p>Log in met je e-mailadres</p>
            
            <div class="login-tabs">
                <button class="tab-btn active" id="loginTabBtn">Inloggen</button>
                <button class="tab-btn" id="registerTabBtn">Account aanmaken</button>
            </div>
            
            <!-- Inlogformulier -->
            <div id="loginForm" class="login-form active">
                <input type="email" id="loginEmail" placeholder="E-mailadres" required>
                <input type="password" id="loginPassword" placeholder="Wachtwoord" required>
                <button id="loginBtn" class="btn btn-primary">Inloggen</button>
                <a href="#" id="forgotPasswordLink" class="forgot-link">Wachtwoord vergeten?</a>
            </div>
            
            <!-- Registratieformulier -->
            <div id="registerForm" class="login-form">
                <input type="text" id="registerUsername" placeholder="Gebruikersnaam" required>
                <input type="email" id="registerEmail" placeholder="E-mailadres" required>
                <input type="password" id="registerPassword" placeholder="Wachtwoord (minimaal 6 tekens)" required>
                <button id="registerBtn" class="btn btn-primary">Account aanmaken</button>
            </div>
            
            <div id="message" class="message"></div>
        </div>
    </div>
    
    <div id="resetPopup" class="popup">
        <div class="popup-content">
            <h3>Wachtwoord opnieuw instellen</h3>
            <input type="email" id="resetEmail" placeholder="E-mailadres" required>
            <button id="resetBtn" class="btn btn-primary">Stuur resetlink</button>
            <button id="closePopup" class="btn btn-secondary">Annuleren</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
